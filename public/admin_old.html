<!DOCTYPE html>
<html>
<head>
    <title>CMP Library - Admin Dashboard</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
    color:#333;
}

h1{
    color:#0066cc;
    margin-bottom:20px;
}

hr{
    margin:25px 0;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-bottom:25px;
}

.card{
    width:160px;
    height:110px;
    border-radius:12px;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.card h2{
    font-size:34px;
    margin-bottom:8px;
}

.card p{
    font-size:15px;
    font-weight:bold;
}

.blue{
    background:#3498db;
}

.green{
    background:#2ecc71;
}

.orange{
    background:#f39c12;
}

.red{
    background:#e74c3c;
}

button{
    width:220px;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#0066cc;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#004c99;
}

.section{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

img{
    max-width:100%;
    border-radius:10px;
}
   
    </style>
</head>
<body>
<h1 align="center">🎓 CMP Library Admin Dashboard</h1>

<div class="cards">

<div class="card blue">
<h2 id="students">0</h2>
<p>👨‍🎓 Students</p>
</div>

<div class="card green">
<h2 id="courses">0</h2>
<p>📚 Courses</p>
</div>

<div class="card orange">
<h2 id="questions">0</h2>
<p>❓ Questions</p>
</div>

<div class="card red">
<h2 id="exams">0</h2>
<p>📝 Exams Taken</p>
</div>

</div>

<hr>

<h1>📚 CMP Library Admin</h1>

<div class="card">

<h2>📚 Course Management</h2>

<button onclick="location.href='course.html'">

Add Course

</button>

</div>



<div class="card">
<h2>📄 PDF Management</h2>

<button onclick="location.href='upload.html'">
Upload Question PDF
</button>

</div>

<div class="card">

<h2>📝 CBT Management</h2>

<button>
Manage Questions
</button>

</div>

<div class="card">

<h2>👨‍🎓 Students</h2>

<button>
View Students
</button>

</div>

<div class="card">

<h2>📊 Results</h2>

<button>
View CBT Results
</button>

<button onclick="window.location.href='admin-results.html'">

📊 View All Results

</button>

</div>
<h2>Uploaded Files</h2>

<div id="fileList">

Loading...

</div>

<script src="admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>CBT Exam</title>
<link rel="stylesheet" href="cbt.css">

</head>

<body>

<body>

<div class="container">

<div class="header">

<h2>📚 CMP Library CBT</h2>

<h3 id="courseCode"></h3>

<p id="courseTitle"></p>

<div class="timer">

⏱ 30:00

</div>

<div class="progress">

<div class="progress-bar"></div>

</div>

</div>

<div class="question-card">

<h2>Exam Information</h2>

<p>

<b>Department:</b>

<span id="department"></span>

</p>

<p>

<b>Level:</b>

<span id="level"></span>

</p>

<p>

<b>Total Questions:</b>

<span id="totalQuestions">

Loading...

</span>

</p>

<hr>

<h3>Instructions</h3>

<ul>

<li>Do not refresh the page.</li>

<li>Each question carries one mark.</li>

<li>Submit before time expires.</li>

<li>Your score is calculated automatically.</li>

</ul>

<button
class="submit"
onclick="startExam()">

🚀 Start Examination

</button>

</div>

</div>

<script src="cbt.js"></script>

</body>
</body>

</html>

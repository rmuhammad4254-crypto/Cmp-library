<!DOCTYPE html>
<html>

<head>

<title>Upload Question PDF</title>

<link rel="stylesheet" href="upload.css">

</head>


<body>


<div class="container">


<div class="card">


<h2>📝 Upload CBT Question PDF</h2>


<label>Select Course</label>

<select id="course">

<option>
Loading courses...
</option>

</select>



<form id="uploadForm"
enctype="multipart/form-data">


<label>
Choose PDF File
</label>


<input
type="file"
id="pdf"
accept=".pdf"
required>


<button type="submit">

Upload Question PDF

</button>


</form>



<p id="message"></p>


</div>


</div>



<script src="upload.js"></script>


</body>

</html>

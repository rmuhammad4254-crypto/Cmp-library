<!DOCTYPE html>
<html>
<head>
    <title>CMP Library - Register</title>
</head>
<body>

<h1>Student Registration</h1>

<form id="registerForm">

    <input
        type="text"
        id="admission_no"
        placeholder="Admission Number"
        required>

    <br><br>

    <input
        type="text"
        id="full_name"
        placeholder="Full Name"
        required>

    <br><br>

    <input
        type="text"
        id="department"
        placeholder="Department"
        required>

    <br><br>

    <input
        type="text"
        id="level"
        placeholder="Level"
        required>

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<script src="register.js"></script>

</body>
</html>
